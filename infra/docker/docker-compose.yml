services:
  postgres:
    image: postgres:15-alpine
    container_name: fashion-agent-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fashion_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_pg_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fashion-agent-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: fashion-agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: fashion-agent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  dify-db:
    image: postgres:15-alpine
    container_name: fashion-agent-dify-db
    environment:
      POSTGRES_DB: dify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_pg_password}
    volumes:
      - dify_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  dify-redis:
    image: redis:7-alpine
    container_name: fashion-agent-dify-redis
    command: redis-server --appendonly yes
    volumes:
      - dify_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dify-api:
    image: langgenius/dify-api:latest
    container_name: fashion-agent-dify-api
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    env_file:
      - ../env/.env.example
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me_pg_password}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_USE_SSL: "false"
      SECRET_KEY: ${DIFY_SECRET_KEY:-replace_me}
      CONSOLE_WEB_URL: http://localhost:${DIFY_WEB_PORT:-3000}
      SERVICE_API_URL: http://localhost:${DIFY_API_PORT:-5001}
      APP_WEB_URL: http://localhost:${DIFY_WEB_PORT:-3000}
      STORAGE_TYPE: s3
      S3_ENDPOINT: http://minio:9000
      S3_USE_AWS_MANAGED_IAM: "false"
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      S3_BUCKET_NAME: ${MINIO_BUCKET:-fashion-agent}
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
    ports:
      - "5001:5001"

  dify-worker:
    image: langgenius/dify-api:latest
    container_name: fashion-agent-dify-worker
    depends_on:
      dify-api:
        condition: service_started
    env_file:
      - ../env/.env.example
    environment:
      MODE: worker
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me_pg_password}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      SECRET_KEY: ${DIFY_SECRET_KEY:-replace_me}
      STORAGE_TYPE: s3
      S3_ENDPOINT: http://minio:9000
      S3_USE_AWS_MANAGED_IAM: "false"
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      S3_BUCKET_NAME: ${MINIO_BUCKET:-fashion-agent}
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333

  dify-web:
    image: langgenius/dify-web:latest
    container_name: fashion-agent-dify-web
    depends_on:
      dify-api:
        condition: service_started
    environment:
      CONSOLE_API_URL: http://localhost:${DIFY_API_PORT:-5001}
      APP_API_URL: http://localhost:${DIFY_API_PORT:-5001}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  dify_postgres_data:
  dify_redis_data:
